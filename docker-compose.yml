services:
  # ─── Backend (Node.js / Express API) ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skybeing-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env # never commit this file — copy .env.example and fill in values
    volumes:
      - ./backend/public/temp:/app/public/temp # multer upload temp dir
    networks:
      - skybeing-net
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Frontend (React / Vite → Nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # These are baked into the static build at build-time.
        # Override them via a .env file or shell env before running docker compose build.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: skybeing-frontend
    restart: unless-stopped
    ports:
      - "3000:80" # access frontend at http://localhost:3000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - skybeing-net

networks:
  skybeing-net:
    driver: bridge
